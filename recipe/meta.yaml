{% set name = "animatplot-ng" %}
{% set version = "0.4.6" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 28251831fccd97f6e146a801aa836cbf4f5438ace24eb4204a069ab006eb2385

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
    - setuptools_scm
    - setuptools_scm_git_archive
  run:
    - python >={{ python_min }}
    - matplotlib-base >=2.2

test:
  requires:
    - python {{ python_min }}
  imports:
    - animatplot
    - animatplot.blocks
    - animatplot.animations

about:
  home: https://github.com/boutproject/animatplot-ng/
  license: MIT
  license_file: LICENSE
  license_family: MIT
  summary: Animating plots with matplotlib made easy

  description: |
    animatplot is build to make it as easy to produce an animated plot
    as easy as it is to make a static plot.
  doc_url: https://animatplot-ng.readthedocs.io/

extra:
  recipe-maintainers:
    - johnomotani
    - dschwoerer
